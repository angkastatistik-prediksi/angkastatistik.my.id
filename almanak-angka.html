        :root {
            --bg-dark: #0f111a;
            --bg-card: #1a1d29;

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); line-height: 1.6; padding-bottom: 50px; }
        header { background: var(--gradient); padding: 25px 20px; text-align: center; border-bottom: 2px solid var(--accent); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5); }
        header h1 { font-size: 1.6rem; letter-spacing: 1px; text-transform: uppercase; }
        header h1 span { color: var(--accent); }
        
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        
        /* Desain Kotak Almanak Utama */
        .almanak-box { 
            background-color: var(--bg-card); 
            border: 1px dashed var(--accent); 
            border-radius: 16px; 
            padding: 30px 20px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            margin-bottom: 30px; 
        }
        .almanak-title { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        .hari-besar-text { font-size: 1.5rem; font-weight: bold; color: var(--accent); margin-bottom: 5px; text-transform: uppercase; }
        .pasaran-jawa-text { font-size: 1.2rem; font-weight: bold; color: var(--accent-green); margin-bottom: 25px; }
        
        /* Grid Penjelasan Angka Keberuntungan Jawa */
        .grid-almanak { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .card-almanak { background-color: rgba(0,0,0,0.2); border: 1px solid #2d3142; border-radius: 12px; padding: 15px; text-align: center; }
        .card-almanak label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 8px; font-weight: bold; letter-spacing: 0.5px; }
        .card-almanak span { font-size: 1.3rem; font-weight: bold; color: #ffffff; }
        .card-almanak .highlight-green { color: var(--accent-green); }
        .card-almanak .highlight-red { color: var(--ball-red); }
        
        /* Navigasi Control Menu Utama Ringkas */
        .system-controls { display: flex; justify-content: center; margin-top: 25px; }
        .btn-control { width: 100%; max-width: 250px; padding: 10px 14px; text-align: center; border-radius: 6px; font-weight: bold; font-size: 14px; text-decoration: none; cursor: pointer; transition: all 0.2s ease; background-color: #ffc107; color: #000000; border: 1px solid #ff9800; box-shadow: 0 0 8px rgba(255, 193, 7, 0.4); }
        .btn-control:hover { background-color: #ffc300; transform: translateY(-2px); }
        
        footer { text-align: center; padding: 20px 0; margin-top: 40px; border-top: 1px solid #2d3142; color: var(--text-muted); font-size: 0.85rem; }
        footer span { color: var(--accent); }

    <script>
        // --- SISTEM PELACAK DINAMIS ASAL HALAMAN PENGUNJUNG ---
        window.addEventListener('DOMContentLoaded', () => {
            const asalHalaman = document.referrer;
            const tombolKembali = document.getElementById('tombol-kembali-dinamis');

            if (tombolKembali && asalHalaman.trim() !== "") {
                if (asalHalaman.includes('macau.html')) {
                    tombolKembali.href = 'macau.html';
                    tombolKembali.innerText = 'Kembali ke Macau';
                } else if (asalHalaman.includes('sdy.html')) {
                    tombolKembali.href = 'sdy.html';
                    tombolKembali.innerText = 'Kembali ke SDY';
                } else if (asalHalaman.includes('cambodia.html')) {
                    tombolKembali.href = 'cambodia.html';
                    tombolKembali.innerText = 'Kembali ke Cambodia';
                } else if (asalHalaman.includes('china.html')) {
                    tombolKembali.href = 'china.html';
                    tombolKembali.innerText = 'Kembali ke China';
                } else if (asalHalaman.includes('japan.html')) {
                    tombolKembali.href = 'japan.html';
                    tombolKembali.innerText = 'Kembali ke Japan';
                } else if (asalHalaman.includes('sgp.html')) {
                    tombolKembali.href = 'sgp.html';
                    tombolKembali.innerText = 'Kembali ke SGP';
                } else if (asalHalaman.includes('taiwan.html')) {
                    tombolKembali.href = 'taiwan.html';
                    tombolKembali.innerText = 'Kembali ke Taiwan';
                } else if (asalHalaman.includes('hk.html')) {
                    tombolKembali.href = 'hk.html';
                    tombolKembali.innerText = 'Kembali ke HK';
                } else if (asalHalaman.includes('buku-mimpi.html')) {
                    tombolKembali.href = 'buku-mimpi.html';
                    tombolKembali.innerText = 'Kembali ke Buku Mimpi';
                } else if (asalHalaman.includes('rumus-otomatis.html')) {
                    tombolKembali.href = 'rumus-otomatis.html';
                    tombolKembali.innerText = 'Kembali ke Mesin Rumus';
                }
            }
        });
        // --- MESIN HITUNG KALENDER MASEHI & PASARAN JAWA REAL-TIME (TAHUN 2026) ---
        function hitungAlmanakJawa() {
            const daftarHari = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const daftarBulan = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            
            const skrg = new Date();
            const namaHari = daftarHari[skrg.getDay()];
            const tgl = skrg.getDate();
            const namaBulan = daftarBulan[skrg.getMonth()];
            const thn = skrg.getFullYear();

            // Cetak String Tanggal Masehi Utama Ke Layar
            document.getElementById('display-tanggal-masehi').innerText = namaHari + ", " + tgl + " " + namaBulan + " " + thn;

            // --- HITUNGAN RUMUS SAKRAL PASARAN JAWA OTOMATIS BERDASARKAN TANGGAL UTAMA ---
            const daftarPasaran = ['Legi', 'Paing', 'Pon', 'Wage', 'Kliwon'];
            
            // Logika dasar menggunakan patokan selisih hari murni kalender komputer (Sistem Epoch / 1 Januari 1970)
            const msPerHari = 24 * 60 * 60 * 1000;
            // Ditambah kompensasi zona waktu WIB Jakarta agar pergantian hari akurat pukul 00:00 WIB
            const selisihHariMurni = Math.floor((skrg.getTime() + (7 * 60 * 60 * 1000)) / msPerHari);
            
            // Angka 1 Januari 1970 bertepatan dengan pasaran "Wage", maka indeks disesuaikan sisa bagi (% 5)
            const indeksPasaran = (selisihHariMurni + 3) % 5;
            const namaPasaran = daftarPasaran[indeksPasaran];

            // Tampilkan Nama Pasaran Jawa ke Layar Utama
            document.getElementById('display-pasaran-jawa').innerText = "Weton Hari Ini: " + namaHari + " " + namaPasaran;

            // --- HITUNGAN MATEMATIKA NILAI GAIB NEPTU ANGKA IKUT MAIN TOGEL ---
            const mapNeptuHari = { 'Minggu': 5, 'Senin': 4, 'Selasa': 3, 'Rabu': 7, 'Kamis': 8, 'Jumat': 6, 'Sabtu': 9 };
            const mapNeptuPasaran = { 'Legi': 5, 'Paing': 9, 'Pon': 7, 'Wage': 4, 'Kliwon': 8 };

            const nilaiHari = mapNeptuHari[namaHari] || 5;
            const nilaiPasaran = mapNeptuPasaran[namaPasaran] || 5;
            const totalNeptu = nilaiHari + nilaiPasaran;

            // Tampilkan Angka Total Neptu
            document.getElementById('almanak-neptu').innerText = totalNeptu + " (" + nilaiHari + " + " + nilaiPasaran + ")";

            // --- GENERATE DATA ANGKA IKUT MAIN TOGEL 2D SECARA AKURAT BERDASARKAN PASARAN HARI ---
            let aiHariIni = "";
            let cbHariIni = "";
            let kepalaMati = "";
            let ekorMati = "";
            let jalurShio = "";

            if (namaPasaran === 'Legi') {
                aiHariIni = "1, 2, 4, 7"; cbHariIni = "2 atau 7"; kepalaMati = "Digit 5"; ekorMati = "Digit 9"; jalurShio = "Jalur 1 & Jalur 2";
            } else if (namaPasaran === 'Paing') {
                aiHariIni = "0, 3, 5, 8"; cbHariIni = "3 atau 8"; kepalaMati = "Digit 1"; ekorMati = "Digit 6"; jalurShio = "Jalur 2 & Jalur 3";
            } else if (namaPasaran === 'Pon') {
                aiHariIni = "2, 4, 6, 9"; cbHariIni = "4 atau 9"; kepalaMati = "Digit 0"; ekorMati = "Digit 7"; jalurShio = "Jalur 1 & Jalur 3";
            } else if (namaPasaran === 'Wage') {
                aiHariIni = "1, 3, 5, 6"; cbHariIni = "1 atau 5"; kepalaMati = "Digit 2"; ekorMati = "Digit 8"; jalurShio = "Jalur 1 & Jalur 2";
            } else { // Kliwon
                aiHariIni = "0, 4, 7, 8"; cbHariIni = "7 atau 8"; kepalaMati = "Digit 3"; ekorMati = "Digit 4"; jalurShio = "Jalur 2 & Jalur 3";
            }

            // Suntik Seluruh Data Analisis Jawa ke Elemen Box Layar
            document.getElementById('almanak-ai').innerText = aiHariIni;
            document.getElementById('almanak-cb').innerText = cbHariIni;
            document.getElementById('almanak-kepala-mati').innerText = kepalaMati;
            document.getElementById('almanak-ekor-mati').innerText = ekorMati;
            document.getElementById('almanak-shio').innerText = jalurShio;
        }

        // Jalankan kalkulator kalender otomatis saat halaman dibuka
        hitungAlmanakJawa();
    </script>
