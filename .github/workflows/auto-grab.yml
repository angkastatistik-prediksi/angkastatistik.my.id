name: Robot Otomatis Cambodia

on:
  schedule:
    # Berjalan otomatis setiap hari pukul 05:15 UTC (Sama dengan jam 12:15 WIB siang, setelah result sah keluar)
    - cron: '15 5 * * *'
  workflow_dispatch: # Membuat tombol manual agar bisa diklik kapan saja dari HP

jobs:
  jalankan-robot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Memberikan izin agar robot bisa mengedit file result/cambodia.js Anda

    steps:
    - name: Ambil Kode Repositori
      uses: actions/checkout@v4

    - name: Siapkan Sistem Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Jalankan Skrip Memulung Data
      run: node grabber.js

    - name: Simpan Otomatis Ke Repositori GitHub
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add result/cambodia.js
        # Jika ada perubahan file, lakukan commit dan langsung push ke repositori Anda
        git diff-index --quiet HEAD || (git commit -m "Robot: Update data nomor terbaru" && git push)
