name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Ganti ke 'master' jika itu nama branch utama Anda

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Diperbarui ke Node LTS versi 22 terbaru stabil

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build # Ganti jika perintah build Anda berbeda

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Ganti ke '.' jika repositori Anda murni file HTML/JS biasa tanpa proses build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
