name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # <-- Ini yang dimaksud Update Node.js version

      # Bagian install & build dihapus jika Anda tidak memakai npm / framework, langsung upload saja:
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: . # <-- Ini yang dimaksud Update artifact path (Folder Utama)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
