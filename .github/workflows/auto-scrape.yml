name: Otomatisasi Web Scraper

on:
  schedule:
    # Berjalan otomatis setiap hari jam 05:00 UTC (Sama dengan jam 12:00 WIB)
    - cron: '0 5 * * *'
  workflow_dispatch: # Tombol rahasia untuk menjalankan manual dari web GitHub

jobs:
  scrape-job:
    runs-on: ubuntu-latest

    steps:
    - name: Mengunduh Repositori Kode
      uses: actions/checkout@v3

    - name: Mengatur Lingkungan Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Menginstal Google Chrome dan Driver Browser
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Menginstal Pustaka Python (Selenium)
      run: |
        pip install selenium

    - name: Mengeksekusi Skrip Robot Scraper
      run: python scraper_macau.py

    - name: Menyimpan Otomatis Perubahan File JSON ke Github
      run: |
        git config --global user.name "Scraper Bot"
        git config --global user.email "bot@github.com"
        git add result_macau.json
        git commit -m "Update hasil undian otomatis [Skip CI]" || exit 0
        git push
