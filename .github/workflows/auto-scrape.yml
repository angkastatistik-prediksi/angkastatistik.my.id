name: Auto Update Data Taiwan Pools

on:
  schedule:
    # Menggunakan zona waktu UTC. 14:00 UTC = 21:00 WIB
    # Sistem akan otomatis mengecek pada jam 21:00, 21:15, 21:30, dan 21:45 WIB
    - cron: '0,15,30,45 14 * * *'
  workflow_dispatch: # Memunculkan tombol khusus agar Anda bisa update manual kapan saja

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - name: Ambil Kode Repositori
      uses: actions/checkout@v3

    - name: Pasang Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Pasang Library Pendukung
      run: pip install requests

    - name: Jalankan Skrip Scraper
      run: python scraper.py

    - name: Simpan Data Terbaru ke GitHub
      run: |
        git config --global user.name "Sistem Otomatisasi"
        git config --global user.email "actions@github.com"
        git add result.json
        git commit -m "Update hasil undian: $(date)" || exit 0
        git push

