<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Result China Tercepat</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #050505 0%, #121200 50%, #000000 100%);
            --panel-bg: rgba(20, 20, 10, 0.85);
            --accent-yellow: #ffea00;
            --accent-gold: #ffaa00;
            --text-light: #ffffff;
            --text-muted: #cccccc;
            --row-even: rgba(255, 234, 0, 0.03);
            --row-hover: rgba(255, 234, 0, 0.15);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg-gradient); color: var(--text-light);
            min-height: 100vh; padding: 30px 15px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container {
            width: 100%; max-width: 1200px; background: var(--panel-bg);
            border: 1px solid rgba(255, 234, 0, 0.3); border-radius: 16px; padding: 25px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.9), 0 0 15px rgba(255, 234, 0, 0.2);
            backdrop-filter: blur(10px);
        }
        header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid rgba(255, 234, 0, 0.2); padding-bottom: 20px; }
        header h1 {
            font-size: 2.2rem; text-transform: uppercase; letter-spacing: 2px;
            background: linear-gradient(to right, var(--text-light), var(--accent-yellow));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px; font-weight: 800;
        }
        header p { color: var(--text-muted); font-size: 0.95rem; }
        .table-responsive { width: 100%; overflow-x: auto; border-radius: 8px; background: #000000; border: 1px solid rgba(255, 234, 0, 0.1); }
        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 1.1rem; min-width: 700px; }
        thead th {
            background: linear-gradient(180deg, #222200 0%, #000000 100%);
            color: var(--accent-yellow); font-weight: 700; padding: 16px 10px;
            text-transform: uppercase; font-size: 1rem; letter-spacing: 1px;
            border-bottom: 3px solid var(--accent-gold); border-right: 1px solid rgba(255, 234, 0, 0.1);
        }
        tbody td {
            padding: 14px 10px; color: var(--text-light);
            font-family: 'Courier New', monospace; font-weight: bold; font-size: 1.2rem; letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 234, 0, 0.1); border-right: 1px solid rgba(255, 234, 0, 0.05);
        }
        tbody tr:nth-child(even) { background-color: var(--row-even); }
        tbody tr:hover { background-color: var(--row-hover); }
        tbody td:hover { color: var(--accent-yellow); text-shadow: 0 0 10px var(--accent-yellow); }
        footer { margin-top: 25px; text-align: center; font-size: 0.85rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Data Result China</h1>
            <p>Kumpulan data keluaran togel China 4 digit memanjang ke samping otomatis.</p>
        </header>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Senin</th><th>Selasa</th><th>Rabu</th><th>Kamis</th><th>Jumat</th><th>Sabtu</th><th>Minggu</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td></tr>
                </tbody>
            </table>
        </div>
        <footer><p>&copy; Live Result China. All Rights Reserved.</p></footer>
    </div>
</body>
</html>
