<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Result Sydney Tercepat</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c20 0%, #15103c 50%, #0a1128 100%);
            --panel-bg: rgba(20, 16, 45, 0.75);
            --border-glow: #8a2be2;
            --accent-cyan: #00f2ff;
            --accent-blue: #0066ff;
            --text-light: #ffffff;
            --text-muted: #a5a1c9;
            --row-even: rgba(255, 255, 255, 0.03);
            --row-hover: rgba(0, 242, 255, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-light);
            min-height: 100vh;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%; max-width: 1200px;
            background: var(--panel-bg);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 16px; padding: 25px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7), 0 0 15px rgba(138, 43, 226, 0.2);
            backdrop-filter: blur(10px);
        }
        header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid rgba(255, 255, 255, 0.1); padding-bottom: 20px; }
        header h1 {
            font-size: 2.2rem; text-transform: uppercase; letter-spacing: 2px;
            background: linear-gradient(to right, var(--text-light), var(--accent-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px; font-weight: 800;
        }
        header p { color: var(--text-muted); font-size: 0.95rem; }
        .table-responsive { width: 100%; overflow-x: auto; border-radius: 8px; background: #09061c; border: 1px solid rgba(255, 255, 255, 0.05); }
        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 1.1rem; min-width: 700px; }
        thead th {
            background: linear-gradient(180deg, #1f164d 0%, #0d0826 100%);
            color: var(--accent-cyan); font-weight: 700; padding: 16px 10px;
            text-transform: uppercase; font-size: 1rem; letter-spacing: 1px;
            border-bottom: 3px solid var(--accent-blue); border-right: 1px solid rgba(255, 255, 255, 0.05);
        }
        tbody td {
            padding: 14px 10px; color: var(--text-light);
            font-family: 'Courier New', monospace; font-weight: bold; font-size: 1.2rem; letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); border-right: 1px solid rgba(255, 255, 255, 0.03);
        }
        tbody tr:nth-child(even) { background-color: var(--row-even); }
        tbody tr:hover { background-color: var(--row-hover); }
        tbody td:hover { color: var(--accent-cyan); text-shadow: 0 0 8px var(--accent-cyan); }
        footer { margin-top: 25px; text-align: center; font-size: 0.85rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Data Result Sydney</h1>
            <p>Kumpulan data keluaran togel Sydney 4 digit memanjang ke samping otomatis.</p>
        </header>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Senin</th><th>Selasa</th><th>Rabu</th><th>Kamis</th><th>Jumat</th><th>Sabtu</th><th>Minggu</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data otomatis diisi oleh robot bot/sydney.js -->
                </tbody>
            </table>
        </div>
        <footer><p>&copy; Live Result Sydney. All Rights Reserved.</p></footer>
    </div>
</body>
</html>
