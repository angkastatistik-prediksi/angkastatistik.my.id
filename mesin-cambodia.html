<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesin Rumus Cambodia - Full Screen Edition</title>
    <style>
        /* Pengaturan Dasar Layar Penuh */
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #0b071e;
            color: #e0dbf5;
            margin: 0;
            padding: 10px;
            width: 100vw;
            overflow-x: hidden; /* Mencegah geser ke samping */
        }
        
        .container {
            width: 100%;
            max-width: 100%;
            background: #160f38;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        
        h2 {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 8px;
            margin: 0 0 15px 0;
            font-size: 18px;
            text-align: center;
        }

        /* Tombol Proses */
        .btn-proses {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00b4db, #0083b0);
            color: white;
            border: 1px solid #00f0ff;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
            margin-bottom: 15px;
            transition: all 0.2s ease;
        }
        .btn-proses:hover {
            background: linear-gradient(135deg, #00d4ff, #00b4db);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.7);
        }
        
        /* Legenda Kode Warna */
        .legend-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            background: #21164f;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 11px;
            gap: 5px;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .box-color { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }

        /* Tabel Responsif Memanjang ke Bawah */
        .table-wrapper {
            width: 100%;
            overflow-x: hidden; 
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            table-layout: fixed; /* Mengunci lebar kolom agar tidak meluber */
        }
        th, td {
            padding: 8px 4px;
            text-align: center;
            border: 1px solid rgba(155, 89, 182, 0.2);
            word-wrap: break-word;
        }
        th {
            background: #23124d;
            color: #ffffff;
            font-size: 11px;
            border-bottom: 2px solid #00d4ff;
        }
        tr:nth-child(even) td { background-color: #1d1449; }
        tr:nth-child(odd) td { background-color: #19113e; }
        
        /* Efek Pewarnaan Berdasarkan Logika */
        .bg-as-off { background-color: #c0392b !important; color: #fff; font-weight: bold; } /* Merah untuk AS OFF */
        .bg-kepala-off { background-color: #d35400 !important; color: #fff; font-weight: bold; } /* Jingga/Oranye untuk Kepala OFF */
        .bg-tunggal { background-color: #27ae60 !important; color: #fff; font-weight: bold; box-shadow: inset 0 0 8px #00ff00; } /* Hijau untuk Tunggal */
        .result-cell { font-weight: bold; color: #00d4ff; font-size: 14px; }
        
        /* Kotak Detail Logika di Bawah */
        .detail-box {
            margin-top: 20px;
            background: #11092c;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(155, 89, 182, 0.3);
            display: none; /* Sembunyi sebelum tombol diklik */
            font-size: 12px;
            max-height: 250px;
            overflow-y: auto; /* Memanjang ke bawah jika teks banyak */
        }
        .detail-box h3 { margin-top: 0; color: #00d4ff; font-size: 14px; }
        .log-item { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); color: #b3a7e6; }
    </style>
</head>
<body>

<div class="container">
    <h2>Mesin Rumus Cambodia</h2>
    
    <!-- Tombol Pemicu Hitung -->
    <button class="btn-proses" onclick="jalankanMesin()">PROSES ANGKA MAIN</button>
    
    <!-- Panduan Warna -->
    <div class="legend-container">
        <div class="legend-item"><span class="box-color bg-as-off"></span> Pangkas AS (Merah)</div>
        <div class="legend-item"><span class="box-color bg-kepala-off"></span> Pangkas Kepala (Oranye)</div>
        <div class="legend-item"><span class="box-color bg-tunggal"></span> Angka Tunggal (Hijau)</div>
    </div>

    <!-- Area Tabel Utama -->
    <div class="table-wrapper">
        <table id="resultTable">
            <thead>
                <tr>
                    <th style="width: 10%;">No</th>
                    <th style="width: 18%;">Result</th>
                    <th style="width: 18%;">AM 4D</th>
                    <th style="width: 18%;">3D</th>
                    <th style="width: 18%;">2D (Kuat)</th>
                    <th style="width: 18%;">Tunggal</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="6" style="color: #b3a7e6; padding: 20px;">Silakan klik tombol di atas untuk memproses data dari file cambodia.js</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Wadah Keterangan yang dipindah ke bawah -->
    <div id="detailLogBox" class="detail-box">
        <h3>Uraian Pelacakan Logika Histori:</h3>
        <div id="logContent"></div>
    </div>
</div>

<!-- MEMANGGIL DATA RESULT DARI FILE EKSTERNAL -->
<script src="result/cambodia.js"></script>
<script>
    const mistikBaru = { '0':8, '1':7, '2':6, '3':9, '4':5, '5':4, '6':2, '7':1, '8':0, '9':3 };
    const mistikLama = { '1':0, '0':1, '2':5, '5':2, '3':8, '8':3, '4':7, '7':4, '6':9, '9':6 };

    function jalankanMesin() {
        const tbody = document.getElementById('tableBody');
        const detailBox = document.getElementById('detailLogBox');
        const logContent = document.getElementById('logContent');

        if (typeof DATA_PAITO_CAMBODIA === 'undefined') {
            alert("File result/cambodia.js tidak terbaca atau variabel DATA_PAITO_CAMBODIA salah.");
            return;
        }

        let rawEntries = DATA_PAITO_CAMBODIA.replace(/[\s\n\r]/g, '').split(',');
        let cleanResults = [];

        for (let entry of rawEntries) {
            if (entry.length === 4 && !isNaN(entry)) {
                cleanResults.push(entry);
            }
        }

        if (cleanResults.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="color:red;">Data paito kosong.</td></tr>`;
            return;
        }

        let barisData = [];

        // 1. Hitung AM 4D Dasar Berantai
        for (let i = 0; i < cleanResults.length; i++) {
            let res = cleanResults[i];
            let as = parseInt(res[0]);
            let cop = parseInt(res[1]);
            let kepala = parseInt(res[2]);
            let ekor = parseInt(res[3]);

            let selisihAsKep = Math.abs(as - kepala);
            let selisihCopEkor = Math.abs(cop - ekor);
            let totalUtama = selisihAsKep + selisihCopEkor;

            if (totalUtama >= 10) {
                let str = totalUtama.toString();
                totalUtama = parseInt(str[0]) + parseInt(str[1]);
                if (totalUtama >= 10) {
                    let str2 = totalUtama.toString();
                    totalUtama = parseInt(str2[0]) + parseInt(str2[1]);
                }
            }

            let n1 = totalUtama;
            let n2 = mistikBaru[n1.toString()];
            let n3 = mistikLama[n2.toString()];
            let n4 = (n3 + 4) % 10;

            barisData.push({
                result: res,
                as: res[0],
                kepala: res[2],
                am4: [n1, n2, n3, n4].map(String)
            });
        }

        let htmlTable = "";
        let htmlLogs = [];

        // 2. Lacak Mundur & Terapkan Pewarnaan Sel
        for (let i = barisData.length - 1; i >= 0; i--) {
            let current = barisData[i];
            let am3 = [...current.am4];
            let am2 = [];
            let tunggal = "";

            // A. Pangkas AS (3D)
            let angkaOff3D = "";
            let ketemuAS = false;
            for (let j = i - 1; j >= 0; j--) {
                let targetAS = barisData[j].as;
                if (am3.includes(targetAS)) {
                    angkaOff3D = targetAS;
                    am3.splice(am3.indexOf(targetAS), 1);
                    htmlLogs.push(`[Res: ${current.result}] Angka AM ${targetAS} pangkas karena ada AS di result ${barisData[j].result}`);
                    ketemuAS = true;
                    break;
                }
            }
            if (!ketemuAS) {
                angkaOff3D = am3.pop();
                htmlLogs.push(`[Res: ${current.result}] Riwayat AS habis. Otomatis pangkas digit belakang (${angkaOff3D})`);
            }

            // B. Pangkas Kepala (2D Kuat)
            am2 = [...am3];
            let angkaOff2D = "";
            let ketemuKepala = false;
            for (let j = i - 1; j >= 0; j--) {
                let targetKepala = barisData[j].kepala;
                if (am2.includes(targetKepala)) {
                    angkaOff2D = targetKepala;
                    am2.splice(am2.indexOf(targetKepala), 1);
                    htmlLogs.push(`[Res: ${current.result}] Angka AM ${targetKepala} pangkas karena ada Kepala di result ${barisData[j].result}`);
                    ketemuKepala = true;
                    break;
                }
            }
            if (!ketemuKepala) {
                angkaOff2D = am2.pop();
                htmlLogs.push(`[Res: ${current.result}] Riwayat Kepala habis. Otomatis pangkas digit belakang (${angkaOff2D})`);
            }

            // C. Angka Tunggal
            if (i > 0) {
                let am4Atas = barisData[i - 1].am4;
                let cocok = am2.filter(num => am4Atas.includes(num));
                tunggal = cocok.length > 0 ? cocok[0] : am2[0];
                htmlLogs.push(`[Res: ${current.result}] Angka Tunggal terpilih: ${tunggal}`);
            } else {
                tunggal = "-";
            }

            // Konstruksi tampilan string 4D dasar dengan tanda visual warna pangkas
            let strAm4 = current.am4.map(n => {
                if (n === angkaOff3D) return `<span class="bg-as-off" style="padding:1px 4px; border-radius:2px;">${n}</span>`;
                if (n === angkaOff2D) return `<span class="bg-kepala-off" style="padding:1px 4px; border-radius:2px;">${n}</span>`;
                return n;
            }).join(' ');

            htmlTable += `
                <tr>
                    <td style="color:#b3a7e6; font-size:11px;">${i + 1}</td>
                    <td class="result-cell">${current.result}</td>
                    <td style="font-size:11px;">${strAm4}</td>
                    <td>${am3.join('')}</td>
                    <td>${am2.join('')}</td>
                    <td class="bg-tunggal">${tunggal}</td>
                </tr>
            `;
        }

        // Cetak hasil ke layar secara rapi memanjang ke bawah
        tbody.innerHTML = htmlTable;
        logContent.innerHTML = htmlLogs.map(text => `<div class="log-item">${text}</div>`).join('');
        detailBox.style.display = "block"; // Tampilkan detail log di dasar layar setelah tombol ditekan
    }
</script>
</body>
</html>
