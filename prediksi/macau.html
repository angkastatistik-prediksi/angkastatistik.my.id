        .grid-putaran {

        .btn-putaran {
            background: #21164f; border: 1px solid rgba(0, 212, 255, 0.2);

            border-radius: 6px; cursor: pointer; transition: all 0.2s;

        .btn-putaran.active {
            background: linear-gradient(135deg, #ff0055, #990033);
            color: #fff; border: 1px solid #ff4d88; box-shadow: 0 0 12px rgba(255, 0, 85, 0.6);
        }
        
        .trek-list { display: flex; flex-direction: column; gap: 15px; }
        .card-hari {
            background: linear-gradient(135deg, #1d1449, #130932);
            border: 1px solid rgba(155, 89, 182, 0.2);
            border-radius: 10px;
            padding: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .card-header {
            display: flex; justify-content: space-between; font-size: 11px;
            color: #a493e3; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 6px;
        }
        .card-title { color: #00e5ff; font-weight: bold; }
        
        .ball-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .row-label { font-size: 11px; color: #b3a7e6; width: 65px; text-align: left; }
        
        /* BOLA NEON BERKILAU */
        .ball {
            width: 28px; height: 28px; border-radius: 50%; display: inline-flex;
            align-items: center; justify-content: center; font-size: 13px; font-weight: bold;
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.4), 2px 2px 5px rgba(0,0,0,0.5);
        }
        .ball-red {
            background: radial-gradient(circle at 8px 8px, #ff4d4d, #990000); color: #ffffff;
            border: 1px solid #ff8080; box-shadow: 0 0 8px rgba(255, 77, 77, 0.5);
        }
        .ball-white {
            background: radial-gradient(circle at 8px 8px, #ffffff, #b0b0b0); color: #11072c;
            border: 1px solid #ffffff; box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }
        
        /* KOMPONEN PANEL PREDIKSI KOTAK */
        .predict-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            background: rgba(0,0,0,0.2);
            padding: 8px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .predict-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
            font-size: 11px;
            color: #b3a7e6;
        }
        .predict-label {
            font-size: 10px;
            color: #8c7dbd;
            text-transform: uppercase;
            font-weight: bold;
        }
        
        footer {
            position: relative; text-align: center; padding: 15px; margin-top: 20px;
            border-top: 1px solid rgba(155, 89, 182, 0.2); color: #8c7dbd; font-size: 10px;
        }
    </style>
</head>

    <!-- MEMANGGIL DATA RESULT DARI FILE EKSTERNAL -->
    <script src="result/macau.js"></script>
    <script>
        const mistikBaru = { '0':8, '1':7, '2':6, '3':9, '4':5, '5':4, '6':2, '7':1, '8':0, '9':3 };
        const mistikLama = { '1':0, '0':1, '2':5, '5':2, '3':8, '8':3, '4':7, '7':4, '6':9, '9':6 };
        
        let putaranAktif = 1;

        function gantiPutaran(nomorPutaran) {
            putaranAktif = nomorPutaran;
            document.querySelectorAll('.btn-putaran').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-p${nomorPutaran}`).classList.add('active');
            hitungTrek10HariMacau();
        }

        function hitungTrek10HariMacau() {
            const container = document.getElementById('trekListContainer');
            
            if (typeof DATA_PAITO_MACAU === 'undefined') {
                container.innerHTML = `<div style='color:#ff4d4d; text-align:center; padding:20px;'>Gagal memuat! Variabel DATA_PAITO_MACAU tidak ditemukan.</div>`;
                return;
            }

            let barisTeks = DATA_PAITO_MACAU.trim().split('\n');
            let totalDataPaito = [];

            for (let b of barisTeks) {
                let barisBersih = b.trim();
                if (!barisBersih) continue;

                let kolom = barisBersih.split(',');
                if (kolom.length < 2) continue;

                let tanggalText = kolom[0].trim(); 
                let resRaw = kolom[putaranAktif] ? kolom[putaranAktif].trim() : "";
                let res = resRaw.replace(/[\s-]/g, '');

                if (res.length === 4 && !isNaN(res)) {
                    let as = parseInt(res[0]);
                    let cop = parseInt(res[1]);
                    let kepala = parseInt(res[2]);
                    let ekor = parseInt(res[3]);

                    let totalUtama = Math.abs((as + cop) - (kepala + ekor));
                    if (totalUtama >= 10) {
                        let str = totalUtama.toString();
                        totalUtama = parseInt(str[0]) + parseInt(str[1]);
                        if (totalUtama >= 10) {
                            let str2 = totalUtama.toString();
                            totalUtama = parseInt(str2[0]) + parseInt(str2[1]);
                        }
                    }

                    let n1 = totalUtama;
                    let n2 = mistikBaru[n1.toString()] !== undefined ? mistikBaru[n1.toString()] : 0;
                    let n3 = mistikLama[n2.toString()] !== undefined ? mistikLama[n2.toString()] : 0;
                    let n4 = (n3 + 4) % 10;

                    totalDataPaito.push({
                        tanggal: tanggalText,
                        result: res,
                        asDigit: res[0],
                        kepalaDigit: res[2],
                        am4: [n1, n2, n3, n4].map(String)
                    });
                }
            }

            if (totalDataPaito.length === 0) {
                container.innerHTML = `<div style='text-align:center; padding:20px; color:#a493e3;'>Tidak ada data valid untuk Putaran P${putaranAktif}.</div>`;
                return;
            }

            let htmlCards = "";
            let batasHitung = 0;

            for (let i = totalDataPaito.length - 1; i >= 0; i--) {
                if (batasHitung >= 10) break;
                
                let current = totalDataPaito[i];
                let am3 = [...current.am4];
                let am2 = [];
                let tunggal = "";

                // A. Saring AM 3 Digit (Pangkas AS)
                for (let j = i - 1; j >= 0; j--) {
                    let targetAS = totalDataPaito[j].asDigit;
                    if (am3.includes(targetAS)) {
                        am3.splice(am3.indexOf(targetAS), 1);
                        break;
                    }
                }
                if (am3.length === 4) am3.pop();

                // B. Saring Angka Kuat 2 Digit (Pangkas Kepala)
                am2 = [...am3];
                for (let j = i - 1; j >= 0; j--) {
                    let targetKepala = totalDataPaito[j].kepalaDigit;
                    if (am2.includes(targetKepala)) {
                        am2.splice(am2.indexOf(targetKepala), 1);
                        break;
                    }
                }
                if (am2.length === 3) am2.pop();

                // C. Penentuan Angka Tunggal 1 Digit
                if (i > 0) {
                    let am4Atas = totalDataPaito[i - 1].am4;
                    let cocok = am2.filter(num => am4Atas.includes(num));
                    tunggal = cocok.length > 0 ? cocok[0] : am2[0];
                } else {
                    tunggal = am2[0];
                }

                // D. Logika Pemisahan Komponen: Kuat, Tengah, dan Jarang Keluar
                let angkaKuatSatu = am2[0] || "0";
                let angkaTengahSatu = am2[1] || "1";
                
                // Cari angka jarang keluar (mencari angka dari AM 4D asli yang tidak lolos ke saringan am2)
                let sisaJarangKeluar = current.am4.filter(num => !am2.includes(num));
                let angkaJarangKeluar = sisaJarangKeluar.length > 0 ? sisaJarangKeluar[0] : "2";

                // Membentuk representasi visual bola-bola berkilau
                let bolaResultHtml = current.result.split('').map(n => `<span class="ball ball-red">${n}</span>`).join(' ');
                let bolaAm3Html = am3.map(n => `<span class="ball ball-white">${n}</span>`).join(' ');
                let bolaAm2Html = am2.map(n => `<span class="ball ball-white">${n}</span>`).join(' ');
                let bolaTunggalHtml = `<span class="ball ball-white" style="border-color:#27ae60; box-shadow:0 0 10px #27ae60;">${tunggal}</span>`;
                
                let bolaKuatHtml = `<span class="ball ball-white" style="border-color:#ff0055; box-shadow:0 0 8px #ff0055;">${angkaKuatSatu}</span>`;
                let bolaTengahHtml = `<span class="ball ball-white" style="border-color:#00e5ff; box-shadow:0 0 8px #00e5ff;">${angkaTengahSatu}</span>`;
                let bolaJarangHtml = `<span class="ball ball-white" style="border-color:#d35400; box-shadow:0 0 8px #d35400;">${angkaJarangKeluar}</span>`;

                htmlCards += `
                    <div class="card-hari">
                        <div class="card-header">
                            <span class="card-title">${current.tanggal}</span>
                            <span>Macau P${putaranAktif}</span>
                        </div>
                        <div class="ball-row">
                            <div class="row-label">Result:</div>
                            ${bolaResultHtml}
                        </div>
                        <div class="predict-container">
                            <div class="predict-item">
                                <span class="predict-label">AM 3 Digit</span>
                                <div class="ball-row">${bolaAm3Html}</div>
                            </div>
                            <div class="predict-item">
                                <span class="predict-label">Kuat 2 Digit</span>
                                <div class="ball-row">${bolaAm2Html}</div>
                            </div>
                            <div class="predict-item" style="grid-column: span 2; margin-top:4px; padding-top:4px; border-top:1px dashed rgba(255,255,255,0.05);">
                                <span class="predict-label" style="color:#27ae60;">Angka Tunggal</span>
                                ${bolaTunggalHtml}
                            </div>
                            <div class="predict-item" style="margin-top:6px;">
                                <span class="predict-label" style="color:#ff0055;">Angka Kuat</span>
                                ${bolaKuatHtml}
                            </div>
                            <div class="predict-item" style="margin-top:6px;">
                                <span class="predict-label" style="color:#00e5ff;">Angka Tengah</span>
                                ${bolaTengahHtml}
                            </div>
                            <div class="predict-item" style="grid-column: span 2; margin-top:6px; align-items:center; width:100%;">
                                <span class="predict-label" style="color:#d35400;">Jarang Keluar</span>
                                ${bolaJarangHtml}
                            </div>
                        </div>
                    </div>
                `;
                batasHitung++;
            }

            container.innerHTML = htmlCards;
        }

        window.onload = function() {
            gantiPutaran(1);
        };
    </script>
