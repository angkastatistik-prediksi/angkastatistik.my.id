<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediksi Toto Macau - 10 Hari Bola Angka Berkilau</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #0b071e;
            color: #e0dbf5;
            margin: 0;
            padding: 10px;
            width: 100vw;
            overflow-x: hidden;
            padding-top: 60px;
            padding-bottom: 50px;
        }
        .container {
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            background: #160f38;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        .header-fixed {
            position: fixed; top: 0; left: 0; width: 100%; height: 50px;
            background: linear-gradient(135deg, #180d3d, #0d0624);
            border-bottom: 2px solid #00d4ff;
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            box-shadow: 0 3px 15px rgba(0,229,255,0.3);
        }
        .header-fixed h2 { font-size: 14px; margin: 0; color: #fff; text-shadow: 0 0 8px #00d4ff; letter-spacing: 1px; }
        .grid-putaran {
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-bottom: 20px;
        }
        .btn-putaran {
            background: #21164f; border: 1px solid rgba(0, 212, 255, 0.2);
            color: #00d4ff; padding: 10px 0; font-size: 11px; font-weight: bold;
            border-radius: 6px; cursor: pointer; transition: all 0.2s;
        }
        .btn-putaran.active {
            background: linear-gradient(135deg, #ff0055, #990033);
            color: #fff; border: 1px solid #ff4d88; box-shadow: 0 0 12px rgba(255, 0, 85, 0.6);
        }
        .trek-list { display: flex; flex-direction: column; gap: 15px; }
        .card-hari {
            background: linear-gradient(135deg, #1d1449, #130932);
            border: 1px solid rgba(155, 89, 182, 0.2);
            border-radius: 10px;
            padding: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .card-header {
            display: flex; justify-content: space-between; font-size: 11px;
            color: #a493e3; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 6px;
        }
        .card-title { color: #00e5ff; font-weight: bold; }
        .ball-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .row-label { font-size: 11px; color: #b3a7e6; width: 60px; text-align: left; }
        .ball {
            width: 28px; height: 28px; border-radius: 50%; display: inline-flex;
            align-items: center; justify-content: center; font-size: 13px; font-weight: bold;
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.4), 2px 2px 5px rgba(0,0,0,0.5);
        }
        .ball-red {
            background: radial-gradient(circle at 8px 8px, #ff4d4d, #990000); color: #ffffff;
            border: 1px solid #ff8080; box-shadow: 0 0 8px rgba(255, 77, 77, 0.5);
        }
        .ball-white {
            background: radial-gradient(circle at 8px 8px, #ffffff, #b0b0b0); color: #11072c;
            border: 1px solid #ffffff; box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }
        .badge-box { display: flex; gap: 10px; margin-top: 5px; background: rgba(0,0,0,0.2); padding: 6px; border-radius: 6px; }
        .badge-item { font-size: 11px; color: #b3a7e6; }
        .badge-value { font-weight: bold; padding: 1px 6px; border-radius: 4px; margin-left: 3px; }
        .val-kuat { background: #d35400; color: #fff; box-shadow: 0 0 5px #d35400; }
        .val-tunggal { background: #27ae60; color: #fff; box-shadow: 0 0 5px #27ae60; }
        .footer-fixed {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 35px;
            background: #0d0624; border-top: 1px solid rgba(155, 89, 182, 0.2);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .footer-fixed p { font-size: 10px; color: #8c7dbd; margin: 0; }
    </style>
</head>
<body>

    <header class="header-fixed">
        <h2>TOTO MACAU - 10 HARI BOLA BERKILAU</h2>
    </header>

    <div class="container">
        <div class="grid-putaran">
            <button class="btn-putaran" id="btn-p1" onclick="gantiPutaran(1)">P1</button>
            <button class="btn-putaran" id="btn-p2" onclick="gantiPutaran(2)">P2</button>
            <button class="btn-putaran" id="btn-p3" onclick="gantiPutaran(3)">P3</button>
            <button class="btn-putaran" id="btn-p4" onclick="gantiPutaran(4)">P4</button>
            <button class="btn-putaran" id="btn-p5" onclick="gantiPutaran(5)">P5</button>
            <button class="btn-putaran" id="btn-p6" onclick="gantiPutaran(6)">P6</button>
        </div>

        <div class="trek-list" id="trekListContainer"></div>
    </div>

    <footer class="footer-fixed">
        <p>&copy; 2026 <b>Angka Statistik Pilihan</b>. All Rights Reserved.</p>
    </footer>

    <!-- MEMANGGIL DATA EKSTERNAL -->
    <script src="result/macau.js"></script>
    <script>
        const mistikBaru = { '0':8, '1':7, '2':6, '3':9, '4':5, '5':4, '6':2, '7':1, '8':0, '9':3 };
        const mistikLama = { '1':0, '0':1, '2':5, '5':2, '3':8, '8':3, '4':7, '7':4, '6':9, '9':6 };
        
        let putaranAktif = 1;

        function gantiPutaran(nomorPutaran) {
            putaranAktif = nomorPutaran;
            document.querySelectorAll('.btn-putaran').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-p${nomorPutaran}`).classList.add('active');
            hitungTrek10HariMacau();
        }

        function hitungTrek10HariMacau() {
            const container = document.getElementById('trekListContainer');
            
            if (typeof DATA_PAITO_MACAU === 'undefined') {
                container.innerHTML = `<div style='color:#ff4d4d; text-align:center; padding:20px;'>Gagal memuat! Variabel DATA_PAITO_MACAU tidak terbaca.</div>`;
                return;
            }

            let barisTeks = DATA_PAITO_MACAU.trim().split('\n');
            let totalDataPaito = [];

            for (let b of barisTeks) {
                let barisBersih = b.trim();
                if (!barisBersih) continue;

                let kolom = barisBersih.split(',');
                if (kolom.length < 2) continue;

                let tanggalText = kolom[0].trim(); 
                let res = kolom[putaranAktif] ? kolom[putaranAktif].trim() : "";

                res = res.replace(/[\s-]/g, '');

                if (res.length === 4 && !isNaN(res)) {
                    let as = parseInt(res[0]);
                    let cop = parseInt(res[1]);
                    let kepala = parseInt(res[2]);
                    let ekor = parseInt(res[3]);

                    let totalUtama = Math.abs((as + cop) - (kepala + ekor));
                    if (totalUtama >= 10) {
                        let str = totalUtama.toString();
                        totalUtama = parseInt(str[0]) + parseInt(str[1]);
                        if (totalUtama >= 10) {
                            let str2 = totalUtama.toString();
                            totalUtama = parseInt(str2[0]) + parseInt(str2[1]);
                        }
                    }

                    let n1 = totalUtama;
                    let n2 = mistikBaru[n1.toString()] !== undefined ? mistikBaru[n1.toString()] : 0;
                    let n3 = mistikLama[n2.toString()] !== undefined ? mistikLama[n2.toString()] : 0;
                    let n4 = (n3 + 4) % 10;

                    totalDataPaito.push({
                        tanggal: tanggalText,
                        result: res,
                        asDigit: res[0],
                        kepalaDigit: res[2],
                        am4: [n1, n2, n3, n4].map(String)
                    });
                }
            }

            if (totalDataPaito.length === 0) {
                container.innerHTML = `<div style='text-align:center; padding:20px; color:#a493e3;'>Tidak ada data valid untuk Putaran P${putaranAktif}.</div>`;
                return;
            }

            let htmlCards = "";
            let batasHitung = 0;

            for (let i = totalDataPaito.length - 1; i >= 0; i--) {
                if (batasHitung >= 10) break;
                
                let current = totalDataPaito[i];
                let am3 = [...current.am4];
                let am2 = [];
                let tunggal = "";

                for (let j = i - 1; j >= 0; j--) {
                    let targetAS = totalDataPaito[j].asDigit;
                    if (am3.includes(targetAS)) {
                        am3.splice(am3.indexOf(targetAS), 1);
                        break;
                    }
                }
                if (am3.length === 4) am3.pop();

                am2 = [...am3];
                for (let j = i - 1; j >= 0; j--) {
                    let targetKepala = totalDataPaito[j].kepalaDigit;
                    if (am2.includes(targetKepala)) {
                        am2.splice(am2.indexOf(targetKepala), 1);
                        break;
                    }
                }
                if (am2.length === 3) am2.pop();

                if (i > 0) {
                    let am4Atas = totalDataPaito[i - 1].am4;
                    let cocok = am2.filter(num => am4Atas.includes(num));
                    tunggal = cocok.length > 0 ? cocok[0] : am2[0];
                } else {
                    tunggal = am2[0];
                }

                let bolaResultHtml = current.result.split('').map(n => `<span class="ball ball-red">${n}</span>`).join('');
                let bolaAmHtml = current.am4.map(n => `<span class="ball ball-white">${n}</span>`).join('');

                htmlCards += `
                    <div class="card-hari">
                        <div class="card-header">
                            <span class="card-title">${current.tanggal}</span>
                            <span>Macau P${putaranAktif}</span>
                        </div>
                        <div class="ball-row">
                            <div class="row-label">Result:</div>
                            ${bolaResultHtml}
                        </div>
                        <div class="ball-row" style="margin-top: 4px;">
                            <div class="row-label">AM 4D:</div>
                            ${bolaAmHtml}
                        </div>
                        <div class="badge-box">
                            <div class="badge-item">Kuat: <span class="badge-value val-kuat">${am2.join(',')}</span></div>
                            <div class="badge-item">Tunggal: <span class="badge-value val-tunggal">${tunggal}</span></div>
                        </div>
                    </div>
                `;
                batasHitung++;
            }

            container.innerHTML = htmlCards;
        }

        window.onload = function() {
            gantiPutaran(1);
        };
    </script>
</body>
</html>
