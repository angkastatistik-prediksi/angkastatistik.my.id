    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        .card { background: white; max-width: 400px; margin: 20px auto; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

<body>
    <h1>Taiwan Pools - Hasil Terupdate</h1>
    <p>Waktu Pembaruan Sistem: <span id="time">-</span></p>

    <div class="card">
        <h3>Special Prize</h3>
        <div class="number" id="special">Loading...</div>
    </div>
    <div class="card">
        <h3>Grand Prize</h3>
        <div class="number" id="grand">Loading...</div>
    </div>
    <div class="card">
        <h3>Regular Prize</h3>
        <div class="number" id="regular">Loading...</div>
    </div>

    <script>
        // Mengambil data dari luar folder taiwanpools
        fetch('../result.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('time').innerText = data.updated_at;
                document.getElementById('special').innerText = data.special_prize;
                document.getElementById('grand').innerText = data.grand_prize;
                document.getElementById('regular').innerText = data.regular_prize;
            })
            .catch(err => console.error("Gagal memuat data", err));
    </script>
