            const kataKunci = e.target.value.toLowerCase().trim();
            const hasilFilter = databaseMimpi.filter(item => {
                return item.angka.includes(kataKunci) || item.tafsir.toLowerCase().includes(kataKunci);
            });
            tampilkanSemuaData(hasilFilter);
        });
    </script>
