<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesin Rumus Otomatis SDY - Neon Purple Edition</title>
    <style>
        /* Pengaturan Dasar Layar Penuh */
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #0b071e;
            color: #e0dbf5;
            margin: 0;
            padding: 10px;
            width: 100vw;
            overflow-x: hidden; /* Mencegah geser ke samping */
        }
        
        .container {
            width: 100%;
            max-width: 100%;
            background: #160f38;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        
        h2 {
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 8px;
            margin: 0 0 15px 0;
            font-size: 18px;
            text-align: center;
        }

        /* Tombol Proses */
        .btn-proses {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00b4db, #0083b0);
            color: white;
            border: 1px solid #00f0ff;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
            margin-bottom: 15px;
            transition: all 0.2s ease;
        }
        .btn-proses:hover {
            background: linear-gradient(135deg, #00d4ff, #00b4db);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.7);
        }
        
        /* Legenda Kode Warna SDY */
        .legend-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            background: #21164f;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 11px;
            gap: 5px;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .box-color { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }

        /* Tabel Responsif Memanjang ke Bawah */
        .table-wrapper {
            width: 100%;
            overflow-x: hidden; 
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            table-layout: fixed; /* Lebar kolom dikunci */
        }
        th, td {
            padding: 8px 4px;
            text-align: center;
            border: 1px solid rgba(155, 89, 182, 0.2);
            word-wrap: break-word;
        }
        th {
            background: #23124d;
            color: #ffffff;
            font-size: 11px;
            border-bottom: 2px solid #00d4ff;
        }
        tr:nth-child(even) td { background-color: #1d1449; }
        tr:nth-child(odd) td { background-color: #19113e; }
        
        /* Efek Pewarnaan Berdasarkan Logika SDY */
        .bg-cop-off { background-color: #c0392b !important; color: #fff; font-weight: bold; } /* Merah untuk COP OFF */
        .bg-kepala-off { background-color: #d35400 !important; color: #fff; font-weight: bold; } /* Oranye untuk KEPALA OFF di Tunggal */
        .bg-tunggal { background-color: #27ae60 !important; color: #fff; font-weight: bold; box-shadow: inset 0 0 8px #00ff00; } /* Hijau untuk Tunggal */
        .result-cell { font-weight: bold; color: #00d4ff; font-size: 14px; }
        
        /* Kotak Detail Logika di Bawah */
        .detail-box {
            margin-top: 20px;
            background: #11092c;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(155, 89, 182, 0.3);
            display: none; 
            font-size: 12px;
            max-height: 250px;
            overflow-y: auto; 
        }
        .detail-box h3 { margin-top: 0; color: #00d4ff; font-size: 14px; }
        .log-item { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); color: #b3a7e6; }
    </style>
</head>
<body>

<div class="container">
    <h2>Mesin Logika Transparan - Paito SDY</h2>
    
    <!-- Tombol Pemicu Hitung -->
    <button class="btn-proses" onclick="jalankanMesinSDY()">PROSES ANGKA MAIN</button>
    
    <!-- Panduan Warna SDY -->
    <div class="legend-container">
        <div class="legend-item"><span class="box-color bg-cop-off"></span> Pangkas COP (Merah)</div>
        <div class="legend-item"><span class="box-color bg-kepala-off"></span> Pangkas Kepala (Oranye)</div>
        <div class="legend-item"><span class="box-color bg-tunggal"></span> Angka Tunggal (Hijau)</div>
    </div>

    <!-- Area Tabel Utama -->
    <div class="table-wrapper">
        <table id="resultTable">
            <thead>
                <tr>
                    <th style="width: 10%;">No</th>
                    <th style="width: 18%;">Result</th>
                    <th style="width: 18%;">AM 4D</th>
                    <th style="width: 18%;">AI 3D</th>
                    <th style="width: 18%;">Kuat 2D</th>
                    <th style="width: 18%;">Tunggal</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="6" style="color: #b3a7e6; padding: 20px;">Silakan klik tombol di atas untuk memproses data dari file sdy.js</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Wadah Keterangan di bawah -->
    <div id="detailLogBox" class="detail-box">
        <h3>Uraian Pelacakan Logika Histori SDY:</h3>
        <div id="logContent"></div>
    </div>
</div>

<!-- MEMANGGIL DATA RESULT DARI FILE EKSTERNAL -->
<script src="result/sdy.js"></script>
<script>
    // Kamus Transmutasi Angka SDY
    const tabelIndex = { '0':5, '1':6, '2':7, '3':8, '4':9, '5':0, '6':1, '7':2, '8':3, '9':4 };
    const mistikLama = { '1':0, '0':1, '2':5, '5':2, '3':8, '8':3, '4':7, '7':4, '6':9, '9':6 };
    const mistikBaru = { '0':8, '1':7, '2':6, '3':9, '4':5, '5':4, '6':2, '7':1, '8':0, '9':3 };

    function jalankanMesinSDY() {
        const tbody = document.getElementById('tableBody');
        const detailBox = document.getElementById('detailLogBox');
        const logContent = document.getElementById('logContent');

        // Validasi pemuatan data eksternal sdy.js
        if (typeof DATA_PAITO_SDY === 'undefined') {
            alert("File result/sdy.js tidak terbaca atau variabel DATA_PAITO_SDY salah.");
            return;
        }

        let rawEntries = DATA_PAITO_SDY.replace(/[\s\n\r]/g, '').split(',');
        let cleanResults = [];

        for (let entry of rawEntries) {
            if (entry.length === 4 && !isNaN(entry)) {
                cleanResults.push(entry);
            }
        }

        if (cleanResults.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="color:red;">Data paito sdy kosong.</td></tr>`;
            return;
        }

        let barisData = [];

        // --- LANGKAH 1: PEMBENTUKAN AM 4D BERANTAI ANTI-KEMBAR ---
        for (let i = 0; i < cleanResults.length; i++) {
            let res = cleanResults[i];
            let as = parseInt(res[0]);
            let cop = parseInt(res[1]);
            let kepala = parseInt(res[2]);
            let ekor = parseInt(res[3]);

            let jumlahAsCop = as + cop;
            let jumlahKepEkor = kepala + ekor;
            let totalUtama = Math.abs(jumlahAsCop - jumlahKepEkor);

            if (totalUtama >= 10) {
                let str = totalUtama.toString();
                totalUtama = parseInt(str[0]) + parseInt(str[1]);
                if (totalUtama >= 10) {
                    let str2 = totalUtama.toString();
                    totalUtama = parseInt(str2[0]) + parseInt(str2[1]);
                }
            }

            // Digit 1 (Utama)
            let d1 = totalUtama;
            
            // Digit 2 (Index dari Digit 1)
            let d2 = tabelIndex[d1.toString()];
            
            // Digit 3 (Mistik Lama dari Digit 2. Jika kembar dengan d1, alihkan ke Mistik Baru)
            let d3 = mistikLama[d2.toString()];
            if (d3 === d1 || d3 === d2) {
                d3 = mistikBaru[d2.toString()];
            }
            
            // Digit 4 (Mistik Lama dari Digit 3. Jika kembar dengan yang sebelum-sebelumnya, alihkan ke Mistik Baru)
            let d4 = mistikLama[d3.toString()];
            if (d4 === d1 || d4 === d2 || d4 === d3) {
                d4 = mistikBaru[d3.toString()];
            }

            barisData.push({
                result: res,
                copText: res[1],      // Simpan untuk filter COP
                kepalaText: res[2],   // Simpan untuk filter KEPALA
                am4: [d1, d2, d3, d4].map(String)
            });
        }

        let htmlTable = "";
        let htmlLogs = [];

        // --- LANGKAH 2, 3, & 4: PELACAKAN MUNDUR HISTORI (Bawah ke Atas) ---
        for (let i = barisData.length - 1; i >= 0; i--) {
            let current = barisData[i];
            let am4Asli = [...current.am4];
            let ai3D = [...current.am4]; 
            let kuat2D = [];
            let tunggal = "";

            // A. PANGKAS AI 3 DIGIT (Lacak kolom COP ke atas)
            let angkaOffCOP = "";
            let ketemuCOP = false;
            for (let j = i - 1; j >= 0; j--) {
                let targetCOP = barisData[j].copText;
                if (ai3D.includes(targetCOP)) {
                    angkaOffCOP = targetCOP;
                    ai3D.splice(ai3D.indexOf(targetCOP), 1);
                    htmlLogs.push(`[Res: ${current.result}] Angka AM ${targetCOP} gugur jadi AI 3D karena ada COP di atasnya (Res ${barisData[j].result})`);
                    ketemuCOP = true;
                    break;
                }
            }
            if (!ketemuCOP) {
                angkaOffCOP = ai3D.pop();
                htmlLogs.push(`[Res: ${current.result}] Riwayat COP atas tidak ada yang cocok. Otomatis pangkas digit belakang (${angkaOffCOP})`);
            }

            // B. ANGKA KUAT 2 DIGIT (Saring angka AM 4D yang TIDAK ADA di AI 3D atas)
            if (i > 0) {
                let ai3DAtas = [];
                // Cari AI 3D baris atasnya secara internal
                let am4Atas = [...barisData[i - 1].am4];
                let ketemuCOPAtas = false;
                for (let k = i - 2; k >= 0; k--) {
                    let targetCOPAtas = barisData[k].copText;
                    if (am4Atas.includes(targetCOPAtas)) {
                        am4Atas.splice(am4Atas.indexOf(targetCOPAtas), 1);
                        ai3DAtas = am4Atas;
                        ketemuCOPAtas = true;
                        break;
                    }
                }
                if (!ketemuCOPAtas) { am4Atas.pop(); ai3DAtas = am4Atas; }

                // Ambil angka dari AM 4D kita yang TIDAK ADA di AI 3D baris atas
                kuat2D = am4Asli.filter(num => !ai3DAtas.includes(num));
                
                // Aturan Proteksi: Jika hasil saringan tidak menghasilkan tepat 2 digit (kosong atau terlalu banyak), ambil sisa AI 3D saat ini sebagai default
                if (kuat2D.length !== 2) {
                    kuat2D = [ai3D[0], ai3D[1]];
                }
            } else {
                kuat2D = [ai3D[0], ai3D[1]]; // Baris teratas mutlak mengambil default
            }

            // C. ANGKA TUNGGAL (Pangkas angka Kuat 2D yang duluan keluar di kolom KEPALA ke atas)
            let angkaOffKepala = "";
            let ketemuKepala = false;
            let tempKuatUntukTunggal = [...kuat2D];

            for (let j = i - 1; j >= 0; j--) {
                let targetKepala = barisData[j].kepalaText;
                if (tempKuatUntukTunggal.includes(targetKepala)) {
                    angkaOffKepala = targetKepala;
                    tempKuatUntukTunggal.splice(tempKuatUntukTunggal.indexOf(targetKepala), 1);
                    tunggal = tempKuatUntukTunggal[0]; // Sisa 1 angka terpilih jadi tunggal
                    htmlLogs.push(`[Res: ${current.result}] Dari Kuat [${kuat2D.join(',')}], angka ${angkaOffKepala} OFF karena keluar duluan di Kepala (Res ${barisData[j].result}). Tunggal = ${tunggal}`);
                    ketemuKepala = true;
                    break;
                }
            }
            if (!ketemuKepala) {
                tunggal = kuat2D[0];
                angkaOffKepala = kuat2D[1];
                htmlLogs.push(`[Res: ${current.result}] Riwayat Kepala atas tidak menyentuh Angka Kuat. Tunggal otomatis = ${tunggal}`);
            }

            // Pewarnaan visual dinamis pada kolom AM 4D asli
            let strAm4 = current.am4.map(n => {
                if (n === angkaOffCOP) return `<span class="bg-cop-off" style="padding:1px 4px; border-radius:2px;">${n}</span>`;
                if (n === angkaOffKepala) return `<span class="bg-kepala-off" style="padding:1px 4px; border-radius:2px;">${n}</span>`;
                return n;
            }).join(' ');

            htmlTable += `
                <tr>
                    <td style="color:#b3a7e6; font-size:11px;">${i + 1}</td>
                    <td class="result-cell">${current.result}</td>
                    <td style="font-size:11px; letter-spacing:1px;">${strAm4}</td>
                    <td>${ai3D.join('')}</td>
                    <td>${kuat2D.join('')}</td>
                    <td class="bg-tunggal">${tunggal}</td>
                </tr>
            `;
        }

        // Tampilkan data memanjang ke bawah secara instan
        tbody.innerHTML = htmlTable;
        logContent.innerHTML = htmlLogs.map(text => `<div class="log-item">${text}</div>`).join('');
        detailBox.style.display = "block";
    }
</script>
</body>
</html>
