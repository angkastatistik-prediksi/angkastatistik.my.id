<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        html { scroll-behavior: smooth; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #ffffff; color: #000000; padding: 12px; margin: 0; }
        
        /* LAYOUT PESAN PALSU 404 UNTUK PENGINTIP */
        .error-palsu { max-width: 500px; margin: 100px auto; text-align: center; font-family: monospace; }
        .error-palsu h1 { font-size: 24px; margin-bottom: 5px; color: #333; }
        .error-palsu p { font-size: 14px; color: #666; }
        .input-hidden-pass { border: none; background: transparent; color: transparent; width: 10px; outline: none; caret-color: transparent; }

        /* PANEL ASLI (BARU TERBUKA JIKA PASSWORD COCOK) */
        #panel-utama { display: none; }
        .container { max-width: 480px; margin: 0 auto; border: 1px solid #e0e0e0; border-radius: 12px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); box-sizing: border-box; }
        h2 { font-size: 18px; margin: 0 0 15px 0; text-align: center; border-bottom: 2px solid #2196F3; padding-bottom: 5px; text-transform: uppercase; }
        .grup { margin-bottom: 12px; background: #f9f9f9; padding: 10px; border-radius: 6px; border-left: 4px solid #2196F3; }
        label { display: block; font-weight: bold; font-size: 12px; margin-bottom: 5px; color: #333; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-bottom: 8px; font-size: 14px; background: #ffffff; color: #000000; }
        textarea { width: 100%; min-height: 45px; max-height: 150px; background: #ffffff; color: #000000; border: 1px solid #ccc; border-radius: 4px; padding: 8px; box-sizing: border-box; font-size: 13px; font-family: monospace; resize: none; overflow-y: hidden; display: block; }
        .btn { width: 100%; background: #2196F3; color: #ffffff; border: none; padding: 14px; font-weight: bold; border-radius: 6px; font-size: 15px; cursor: pointer; margin-top: 10px; box-shadow: 0 2px 4px rgba(33,150,243,0.3); }
        .btn:active { background: #1976D2; }
        .notif { padding: 10px; border-radius: 6px; font-size: 13px; text-align: center; font-weight: bold; margin-bottom: 15px; display: none; }
        .sukses { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .gagal { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
    </style>
</head>
<body>

<!-- TAMPILAN PALSU YANG DILIHAT ORANG LAIN -->
<div class="error-palsu" id="box-palsu">
    <h1>404 Not Found</h1>
    <p>The requested URL was not found on this server.</p>
    <!-- Kolom ketik rahasia (tidak terlihat di layar) -->
    <input type="password" id="pass-samaran" class="input-hidden-pass" autofocus>
</div>

<!-- PANEL ASLI UTK EDIT RESULT JIKA PASSWORD BENAR -->
<div id="panel-utama">
    <div class="container">
        <h2>ADMIN GITHUB MULTI PAITO</h2>
        <div id="notif-box" class="notif"></div>

        <div class="grup" style="border-left-color: #000000;">
            <label style="color: #000000;">KREDENSIAL KEAMANAN REPO (TERKUNCI DI HP ANDA)</label>
            <input type="text" id="git-user" placeholder="Username GitHub Anda">
            <input type="text" id="git-repo" placeholder="Nama Repository Anda">
            <input type="password" id="git-token" placeholder="TEMPELKAN KODE AKSES TOKEN (ghp_...) DI SINI">
        </div>

        <div class="grup"><label>1. RESULT MACAU (6X)</label><textarea id="paito-macau"></textarea></div>
        <div class="grup"><label>2. RESULT CAMBODIA</label><textarea id="paito-cambodia"></textarea></div>
        <div class="grup"><label>3. RESULT SDY</label><textarea id="paito-sdy"></textarea></div>
        <div class="grup"><label>4. RESULT CHINA</label><textarea id="paito-china"></textarea></div>
        <div class="grup"><label>5. RESULT JAPAN</label><textarea id="paito-japan"></textarea></div>
        <div class="grup"><label>6. RESULT SGP</label><textarea id="paito-sgp"></textarea></div>
        <div class="grup"><label>7. RESULT TAIWAN</label><textarea id="paito-taiwan"></textarea></div>
        <div class="grup"><label>8. RESULT HK</label><textarea id="paito-hk"></textarea></div>

        <button type="button" class="btn" id="btn-commit">PUSH UPDATE DATA KE GITHUB</button>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // -------------------------------------------------------------------------
    // PASSWORD RAHASIA BAWAAN ANDA ADALAH: paitojitu
    // Kode di bawah "cGFpdG9qaXR1" adalah hasil enkripsi dari kata "paitojitu"
    // Pengintip source code tidak akan tahu isi teks aslinya!
    const SANDI_SAMARAN = "ӭ8twr";
    // -------------------------------------------------------------------------

    const pasaranList = ['macau', 'cambodia', 'sdy', 'china', 'japan', 'sgp', 'taiwan', 'hk'];
    const passInput = document.getElementById('pass-samaran');
    const boxPalsu = document.getElementById('box-palsu');
    const panelUtama = document.getElementById('panel-utama');

    // Paksa agar keyboard HP langsung fokus memunculkan ketikan
    passInput.focus();
    document.body.addEventListener('click', () => passInput.focus());

    // Pengecekan password real-time menggunakan enkripsi Base64
    passInput.addEventListener('input', function() {
        if (btoa(passInput.value) === SANDI_SAMARAN) {
            boxPalsu.style.display = "none";
            panelUtama.style.display = "block";
            document.title = "Admin Multi Paito Panel";
            jalankanSistemUtama();
        }
    });

    function jalankanSistemUtama() {
        function fitHeight(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

        if(localStorage.getItem('saved_git_user')) document.getElementById('git-user').value = localStorage.getItem('saved_git_user');
        if(localStorage.getItem('saved_git_repo')) document.getElementById('git-repo').value = localStorage.getItem('saved_git_repo');
        if(localStorage.getItem('saved_git_token')) document.getElementById('git-token').value = localStorage.getItem('saved_git_token');

        fetch('data-paito.js?t=' + new Date().getTime())
            .then(res => res.text())
            .then(jsContent => {
                pasaranList.forEach(pas => {
                    let regex = new RegExp('"' + pas.toUpperCase() + '":\\s*`([\\s\\S]*?)`');
                    let matches = jsContent.match(regex);
                    if (matches && matches) {
                        const el = document.getElementById('paito-' + pas);
                        el.value = matches.trim();
                        fitHeight(el);
                        el.addEventListener('input', () => fitHeight(el));
                    }
                });
            }).catch(err => console.log("Gagal sinkron data awal"));
    }

    // PROSES PUSH REPO KE GITHUB API VIA HP
    document.getElementById('btn-commit').addEventListener('click', async function() {
        const user = document.getElementById('git-user').value.trim();
        const repo = document.getElementById('git-repo').value.trim();
        const token = document.getElementById('git-token').value.trim();
        const notif = document.getElementById('notif-box');

        if(!user || !repo || !token) { showNotif("Username, Repo, dan Token WAJIB diisi!", "gagal"); return; }

        localStorage.setItem('saved_git_user', user);
        localStorage.setItem('saved_git_repo', repo);
        localStorage.setItem('saved_git_token', token);

        let txt = "const DATABASE_PAITO = {\n";
        pasaranList.forEach((pas, index) => {
            let val = document.getElementById('paito-' + pas).value.trim();
            let lines = val.split('\n').map(l => "  " + l.trim()).join('\n');
            txt += `  "${pas.toUpperCase()}": \`\n${lines}\n  \``;
            if (index < pasaranList.length - 1) txt += ",\n";
        });
        txt += "\n};";

        showNotif("Sedang memproses sambungan aman ke GitHub...", "sukses");
        const url = `https://github.com{user}/${repo}/contents/data-paito.js`;
        let sha = "";

        try {
            let resCheck = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
            if(resCheck.ok) { let dataCheck = await resCheck.json(); sha = dataCheck.sha; }
        } catch(e) {}

        try {
            let resUpdate = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Update paito otomatis via HP Mobile Panel", content: btoa(unescape(encodeURIComponent(txt))), sha: sha })
            });
            if(resUpdate.ok) { showNotif("BERHASIL! Angka paito di server GitHub ter-update. Live dalam 1 menit.", "sukses"); }
            else { let errData = await resUpdate.json(); showNotif("Gagal Simpan: " + errData.message, "gagal"); }
        } catch(err) { showNotif("Eror koneksi internet / Token tidak valid!", "gagal"); }
    });

    function showNotif(msg, tipe) {
        const notif = document.getElementById('notif-box');
        notif.innerText = msg; notif.className = "notif " + tipe; notif.style.display = "block";
        notif.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
});
</script>
</body>
</html>
