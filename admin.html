<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel Simpel</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f1f2f6; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .admin-container { background: #fff; width: 100%; max-width: 400px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #0066cc; margin-bottom: 25px; font-size: 22px; font-weight: bold; }
        .btn-menu { display: block; text-decoration: none; padding: 15px; margin-bottom: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; color: #fff; transition: 0.2s; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        .utama { background: #00b894; }
        .utama:hover { background: #009473; }
        .statistik { background: #0066cc; margin-bottom: 0; }
        .statistik:hover { background: #0052a3; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>HALAMAN ADMIN</h2>

    <!-- Tombol Menu Utama -->
    <a href="index.html" class="btn-menu utama">
        🏠 MENU UTAMA
    </a>

    <!-- Tombol Angka Statistik -->
    <a href="https://angkastatistik.my.id/angkastatistik.html" class="btn-menu statistik">
        ANGKA STATISTIK
    </a>


    <a href="https://github.com/angkastatistik-prediksi/angkastatistik.my.id/blob/main/result/macau.js" class="btn-menu statistik">
        RESULT MACAU
    </a>
</div>

</body>
</html>
